<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cat Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
      padding: 20px;
    }
    
    .container {
      display: flex;
      flex-wrap: wrap;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
      overflow: hidden;
      max-width: 900px;
      width: 100%;
    }
    
.cat-section {
  flex: 1 1 45%;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #f8dbad;
  padding: 30px;
  position: relative;
  min-height: 400px;
}

.cat-image-container {
  position: relative;
  max-width: 100%;
  max-height: 100%;
}

.cat-image-container img {
  display: block;
  width: 100%;
  height: auto;         
  object-fit: contain;  
}

    
    .cat-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.3s ease;
    }
    
    .login-form {
      flex: 1 1 55%;
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: #fff;
    }
    
    .login-form h2 {
      margin-bottom: 25px;
      color: #333;
      font-size: 28px;
      text-align: center;
    }
    
    .input-group {
      margin-bottom: 25px;
      position: relative;
    }
    
    .input-group label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 500;
    }
    
    .input-group input {
      width: 100%;
      padding: 15px;
      padding-right: 45px;
      border-radius: 10px;
      border: 2px solid #ddd;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    
    .input-group input:focus {
      border-color: #6a11cb;
      outline: none;
    }
    
    .input-group .toggle-eye {
      position: absolute;
      right: 15px;
      top: 42px;
      cursor: pointer;
      font-size: 20px;
      color: #777;
      transition: color 0.3s, transform 0.3s;
    }
    
    .input-group .toggle-eye:hover {
      color: #6a11cb;
      transform: scale(1.1);
    }
    
    .login-form button {
      padding: 15px;
      background: linear-gradient(to right, #6a11cb, #2575fc);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 18px;
      font-weight: 600;
      transition: transform 0.3s, box-shadow 0.3s;
      margin-top: 10px;
    }
    
    .login-form button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(106, 17, 203, 0.4);
    }
    
    .additional-links {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
      font-size: 14px;
    }
    
    .additional-links a {
      color: #6a11cb;
      text-decoration: none;
      transition: color 0.3s;
    }
    
    .additional-links a:hover {
      text-decoration: underline;
      color: #2575fc;
    }
    
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }
      
      .cat-section, .login-form {
        flex: 1 1 100%;
      }
      
      .cat-section {
        min-height: 300px;
      }
      
      .cat-image-container {
        width: 220px;
        height: 220px;
      }
    }

    /* Animation for cat image change */
    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0.3; }
      100% { opacity: 1; }
    }
    
    .blink {
      animation: blink 0.4s ease;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="cat-section">
      <div class="cat-image-container">
        <img id="catImage" class="cat-image" src="https://placekitten.com/300/300" alt="Cute Cat">
      </div>
    </div>
    
    <div class="login-form">
      <h2>Welcome Back!</h2>
      <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter your username">
      </div>
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password">
        <span class="toggle-eye" onclick="togglePassword()">
          <i class="fas fa-eye-slash"></i>
        </span>
      </div>
      <button type="submit">Login</button>
      
      <div class="additional-links">
        <a href="#">Forgot Password?</a>
        <a href="#">Create Account</a>
      </div>
    </div>
  </div>

  <script>
    // Using placeholder kitten images - replace with your actual cat images
    const closedEyeCat = "cat.png";
    const openEyeCat = "cat2.png";
    
    // Initialize with closed eye cat
    document.getElementById("catImage").src = closedEyeCat;
    
    function togglePassword() {
      const passwordField = document.getElementById("password");
      const eyeIcon = document.querySelector(".toggle-eye i");
      const catImage = document.getElementById("catImage");
      
      // Add blink animation
      catImage.classList.add("blink");
      
      setTimeout(() => {
        if (passwordField.type === "password") {
          passwordField.type = "text";
          eyeIcon.classList.remove("fa-eye-slash");
          eyeIcon.classList.add("fa-eye");
          catImage.src = openEyeCat;
        } else {
          passwordField.type = "password";
          eyeIcon.classList.remove("fa-eye");
          eyeIcon.classList.add("fa-eye-slash");
          catImage.src = closedEyeCat;
        }
        
        // Remove animation class after transition
        setTimeout(() => {
          catImage.classList.remove("blink");
        }, 400);
      }, 200);
    }
  </script>

</body>
</html>
