<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
</head>
<body>
	<h2>User Name</h2>
	<input type="text" name="" id="username">
	<h2>Password</h2>
	<input type="password" name="" id="pass">
	<button onclick="passtotext()" id="eye">Show</button>

	<script type="text/javascript">
		function passtotext() {
			var passfied = document.getElementById('pass');
			var eyeButton = document.getElementById('eye');
			if (passfied.type === 'password') {
				passfied.type = 'text';
				eyeButton.innerText = "Hide";
			} else {
				passfied.type = 'password';
				eyeButton.innerText = "Show";
			}
		}
	</script>
</body>
</html>
